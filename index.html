:root{
  --paper:#E4E0D3;
  --paper-raised:#EEEAE0;
  --ink:#211D19;
  --graphite:#736B60;
  --graphite-soft:#B9B2A4;
  --sanguine:#B33A22;
  --sanguine-soft:#E7B7A6;
  --sanguine-wash:#F1D9CE;
  --ring-track:rgba(33,29,25,0.12);
  --shadow:rgba(33,29,25,0.22);
  --line:rgba(33,29,25,0.14);
  color-scheme:light;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#171310;
    --paper-raised:#211C17;
    --ink:#ECE4D6;
    --graphite:#9A8F7E;
    --graphite-soft:#4C4638;
    --sanguine:#D65B37;
    --sanguine-soft:#4A2318;
    --sanguine-wash:#3A2019;
    --ring-track:rgba(236,228,214,0.14);
    --shadow:rgba(0,0,0,0.5);
    --line:rgba(236,228,214,0.14);
    color-scheme:dark;
  }
}
:root[data-theme="dark"]{
  --paper:#171310;
  --paper-raised:#211C17;
  --ink:#ECE4D6;
  --graphite:#9A8F7E;
  --graphite-soft:#4C4638;
  --sanguine:#D65B37;
  --sanguine-soft:#4A2318;
  --sanguine-wash:#3A2019;
  --ring-track:rgba(236,228,214,0.14);
  --shadow:rgba(0,0,0,0.5);
  --line:rgba(236,228,214,0.14);
  color-scheme:dark;
}
:root[data-theme="light"]{
  --paper:#E4E0D3;
  --paper-raised:#EEEAE0;
  --ink:#211D19;
  --graphite:#736B60;
  --graphite-soft:#B9B2A4;
  --sanguine:#B33A22;
  --sanguine-soft:#E7B7A6;
  --sanguine-wash:#F1D9CE;
  --ring-track:rgba(33,29,25,0.12);
  --shadow:rgba(33,29,25,0.22);
  --line:rgba(33,29,25,0.14);
  color-scheme:light;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Work Sans',system-ui,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3{text-wrap:balance; margin:0;}
button{font-family:inherit; touch-action:manipulation;}
.num{font-variant-numeric:tabular-nums;}

/* ---------- shell / view switching ---------- */
.view{display:none; min-height:100vh;}
body[data-view="setup"] #view-setup{display:block;}
body[data-view="session"] #view-session{display:flex;}
body[data-view="done"] #view-done{display:flex;}

/* ---------- setup view ---------- */
#view-setup{
  max-width:560px;
  margin:0 auto;
  padding:2.75rem 1.5rem 4rem;
}
.wordmark{
  font-family:'Big Shoulders',sans-serif;
  font-weight:900;
  font-size:clamp(2.6rem,9vw,3.4rem);
  letter-spacing:0.01em;
  line-height:0.9;
  margin-bottom:0.2rem;
}
.wordmark span{color:var(--sanguine);}
.tagline{
  color:var(--graphite);
  font-size:0.95rem;
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:2.5rem;
}

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:6px;
  padding:1.5rem;
  margin-bottom:1.25rem;
}
.card + .card{margin-top:1.25rem;}
.field-label{
  font-size:0.78rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--graphite);
  font-weight:600;
  margin-bottom:0.9rem;
  display:block;
}

/* time stepper */
.time-stepper{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:1.25rem;
}
.stepper-btn{
  width:2.75rem;
  height:2.75rem;
  border-radius:50%;
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--ink);
  font-size:1.4rem;
  line-height:1;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 0.15s, border-color 0.15s;
}
.stepper-btn:hover{border-color:var(--sanguine);}
.stepper-btn:active{background:var(--sanguine-wash);}
.time-display{
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:3.2rem;
  min-width:7rem;
  text-align:center;
  line-height:1;
}
.time-display .unit{
  font-family:'Work Sans',sans-serif;
  font-weight:600;
  font-size:0.95rem;
  color:var(--graphite);
  text-transform:uppercase;
  letter-spacing:0.06em;
  display:block;
  margin-top:0.4rem;
}

/* preset segmented control */
.presets{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0.6rem;
}
.rest-presets{grid-template-columns:repeat(2,1fr);}
.preset-btn{
  border:1px solid var(--line);
  background:var(--paper);
  border-radius:5px;
  padding:0.85rem 0.6rem;
  cursor:pointer;
  text-align:left;
  display:flex;
  flex-direction:column;
  gap:0.55rem;
  transition:border-color 0.15s, background 0.15s;
}
.preset-btn:hover{border-color:var(--graphite);}
.preset-btn[aria-pressed="true"]{
  border-color:var(--sanguine);
  background:var(--sanguine-wash);
}
.preset-name{
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1.15rem;
  letter-spacing:0.01em;
}
.preset-desc{
  font-size:0.72rem;
  color:var(--graphite);
  line-height:1.25;
}
.preset-bar{
  display:flex;
  height:6px;
  border-radius:3px;
  overflow:hidden;
  background:var(--ring-track);
}
.preset-bar i{display:block; height:100%;}

/* preview line */
.preview-line{
  font-size:0.85rem;
  color:var(--graphite);
  text-align:center;
  margin:1.5rem 0 2rem;
  line-height:1.5;
}
.preview-line strong{color:var(--ink); font-weight:600;}

/* settings */
details.card{padding:0;}
details.card summary{
  padding:1rem 1.5rem;
  cursor:pointer;
  font-size:0.78rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--graphite);
  font-weight:600;
  list-style:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
details.card summary::-webkit-details-marker{display:none;}
details.card summary::after{
  content:"+";
  font-size:1.1rem;
  color:var(--graphite);
}
details.card[open] summary::after{content:"−";}
.settings-body{padding:0 1.5rem 1.5rem;}

.setting-block{
  display:flex;
  flex-direction:column;
  padding:1rem 0 1.1rem;
}
.setting-block .field-label{margin-bottom:0.6rem;}

.toggle-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.6rem 0;
  border-top:1px solid var(--line);
  font-size:0.92rem;
}
.toggle-row:first-child{border-top:none;}
.switch{
  position:relative;
  width:2.6rem;
  height:1.5rem;
  flex:none;
}
.switch input{position:absolute; opacity:0; width:100%; height:100%; margin:0; cursor:pointer;}
.switch .track{
  position:absolute; inset:0;
  background:var(--ring-track);
  border-radius:999px;
  transition:background 0.15s;
}
.switch .thumb{
  position:absolute; top:2px; left:2px;
  width:1.2rem; height:1.2rem;
  border-radius:50%;
  background:var(--paper-raised);
  box-shadow:0 1px 2px var(--shadow);
  transition:transform 0.15s;
}
.switch input:checked + .track{background:var(--sanguine);}
.switch input:checked + .track + .thumb{transform:translateX(1.1rem);}
.switch input:focus-visible + .track{outline:2px solid var(--sanguine); outline-offset:2px;}

.breakdown-table{
  display:flex;
  flex-direction:column;
  gap:0;
}
.breakdown-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:0.25rem 1rem;
  padding:0.7rem 0;
  border-top:1px solid var(--line);
  align-items:baseline;
}
.breakdown-row:first-child{border-top:none;}
.breakdown-row .bd-stage{
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1.05rem;
  grid-column:1 / -1;
}
.breakdown-row .bd-detail{
  font-size:0.82rem;
  color:var(--graphite);
  grid-column:1 / -1;
  line-height:1.4;
}
.breakdown-row .bd-subtotal{
  font-size:0.78rem;
  color:var(--graphite);
  grid-column:1 / -1;
  text-align:right;
}
.breakdown-total{
  display:flex;
  justify-content:space-between;
  padding-top:0.9rem;
  margin-top:0.3rem;
  border-top:1px solid var(--ink);
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1rem;
}

.start-btn{
  width:100%;
  background:var(--sanguine);
  color:#fff;
  border:none;
  border-radius:6px;
  padding:1.1rem;
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1.3rem;
  letter-spacing:0.03em;
  text-transform:uppercase;
  cursor:pointer;
  transition:filter 0.15s;
}
.start-btn:hover{filter:brightness(1.08);}
.start-btn:active{filter:brightness(0.95);}

/* ---------- session view ---------- */
#view-session{
  flex-direction:column;
  align-items:stretch;
  min-height:100vh;
  position:relative;
}
.rail{
  height:4px;
  background:var(--ring-track);
  position:relative;
  flex:none;
}
.rail-fill{
  position:absolute; top:0; left:0; height:100%;
  background:var(--sanguine);
  width:0%;
  transition:width 0.3s linear;
}
.session-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:1.1rem 1.4rem 0;
  flex:none;
}
.session-mark{
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1rem;
  letter-spacing:0.04em;
  color:var(--graphite-soft);
}
.session-clock{
  font-size:0.85rem;
  color:var(--graphite);
}

.stage-flag{
  text-align:center;
  font-size:0.78rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--graphite);
  margin-top:1.4rem;
  min-height:1.2em;
}

.stage-title{
  text-align:center;
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:clamp(1.6rem,7vw,2.5rem);
  line-height:1.05;
  padding:0.4rem 1.5rem 0;
  min-height:2.4em;
  display:flex;
  align-items:center;
  justify-content:center;
}

.dial-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  min-height:0;
  padding:1rem;
}
#dial{display:block;}
.dial-time{
  position:absolute;
  font-family:'Big Shoulders',sans-serif;
  font-weight:900;
  font-size:clamp(3.2rem,15vw,5.5rem);
  line-height:1;
  transition:color 0.2s;
}
.dial-time.urgent{color:var(--sanguine);}

.next-line{
  text-align:center;
  font-size:0.85rem;
  color:var(--graphite);
  padding-bottom:0.8rem;
  min-height:1.3em;
}
.next-line strong{color:var(--ink); font-weight:600;}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:1.4rem;
  padding:1.2rem 1.5rem calc(1.6rem + env(safe-area-inset-bottom));
  flex:none;
}
.ctrl-btn{
  border:1px solid var(--line);
  background:var(--paper-raised);
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--ink);
  transition:border-color 0.15s, background 0.15s;
}
.ctrl-btn svg{width:1.3rem; height:1.3rem;}
.ctrl-btn:hover{border-color:var(--sanguine);}
.ctrl-btn.primary{
  width:4.4rem; height:4.4rem;
  background:var(--sanguine);
  border-color:var(--sanguine);
  color:#fff;
}
.ctrl-btn.primary svg{width:1.7rem; height:1.7rem;}
.ctrl-btn.secondary{width:3.4rem; height:3.4rem;}
.ctrl-btn[data-confirming="true"]{
  background:var(--sanguine);
  border-color:var(--sanguine);
  color:#fff;
}
.ctrl-btn:focus-visible{outline:2px solid var(--sanguine); outline-offset:2px;}

body[data-kind="gap"] .dial-time{color:var(--graphite);}
body[data-kind="prep"] .dial-time{color:var(--graphite);}

/* ---------- done view ---------- */
#view-done{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:2rem;
  gap:1.6rem;
}
.done-mark{
  font-family:'Big Shoulders',sans-serif;
  font-weight:900;
  font-size:clamp(2.2rem,8vw,3rem);
}
.done-stat{color:var(--graphite); font-size:1rem;}
.done-stat strong{color:var(--ink); font-family:'Big Shoulders',sans-serif; font-size:1.3rem; font-weight:800;}
.restart-btn{
  background:none;
  border:1px solid var(--line);
  color:var(--ink);
  border-radius:6px;
  padding:0.85rem 1.8rem;
  font-family:'Big Shoulders',sans-serif;
  font-weight:800;
  font-size:1rem;
  letter-spacing:0.03em;
  text-transform:uppercase;
  cursor:pointer;
}
.restart-btn:hover{border-color:var(--sanguine);}

@media (prefers-reduced-motion: reduce){
  *{transition-duration:0.001ms !important; animation-duration:0.001ms !important;}
}

.visually-hidden{
  position:absolute; width:1px; height:1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap;
}

<div class="visually-hidden" role="status" aria-live="polite" id="liveRegion"></div>

<script>
(function(){
  "use strict";

  /* ---------------- schedule generation ---------------- */

  /* Rest is a % of that tier's pose length, but the % itself tapers off as
     poses get longer — otherwise a flat percentage balloons into minutes of
     rest on a 15-20 min pose. This keeps rest rising in absolute terms
     (repositioning takes a bit longer after a long hold) while staying short. */
  var DEFAULT_STAGES = [
    {label:"30 SEC", sec:30},
    {label:"1 MIN",  sec:60},
    {label:"2 MIN",  sec:120},
    {label:"5 MIN",  sec:300},
    {label:"10 MIN", sec:600},
    {label:"15 MIN", sec:900},
    {label:"20 MIN", sec:1200}
  ];

  /* Rest is a % of that tier's pose length, tapering off as poses get
     longer so it doesn't balloon into minutes on a 15-20 min pose. */
  var REST_PRESETS = {
    tight:    [8, 7, 5, 4, 3, 2, 1.5],
    generous: [18, 15, 11, 8, 6, 4, 3]
  };

  var PRESETS = {
    short:    {name:"Short",    weights:[0.30,0.32,0.23,0.10,0.05,0.00,0.00]},
    balanced: {name:"Balanced", weights:[0.08,0.12,0.18,0.22,0.20,0.12,0.08]},
    longer:   {name:"Longer",   weights:[0.03,0.05,0.10,0.17,0.25,0.20,0.20]}
  };

  var PREP_SEC = 15;
  var MAX_POSES_PER_STAGE = 10;

  function fmtDuration(sec){
    if(sec < 60) return sec + " sec";
    var m = sec/60;
    return (m % 1 === 0 ? m : m.toFixed(1)) + (m === 1 ? " min" : " min");
  }

  function fmtClock(totalSec){
    totalSec = Math.max(0, Math.round(totalSec));
    var m = Math.floor(totalSec/60);
    var s = totalSec % 60;
    return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
  }

  function currentStages(restStyle){
    var pcts = REST_PRESETS[restStyle] || REST_PRESETS.generous;
    return DEFAULT_STAGES.map(function(st, i){
      return {label:st.label, sec:st.sec, gap:Math.round(st.sec*pcts[i]/100)};
    });
  }

  function buildSchedule(totalMinutes, presetKey, stages){
    var weights = PRESETS[presetKey].weights;
    var totalSec = totalMinutes * 60;
    /* Seed each weighted stage from its ideal share of the total, but allow
       it to round down to zero poses — with 7 tiers spanning 30s to 20min,
       forcing a floor of 1 pose per tier blows way past the target on
       shorter sessions. A tier simply drops out if there isn't room for it. */
    function clampCount(n){
      return Math.max(0, Math.min(MAX_POSES_PER_STAGE, n));
    }

    var counts = stages.map(function(st, i){
      var w = weights[i] || 0;
      if(w <= 0) return 0;
      var idealN = (totalSec * w) / (st.sec + st.gap);
      return clampCount(Math.round(idealN));
    });

    function activeIndices(){
      var out = [];
      counts.forEach(function(n,i){ if(n>0) out.push(i); });
      return out;
    }

    if(activeIndices().length === 0){
      var bestI = 0, bestW = -1;
      weights.forEach(function(w,i){ if(w > bestW){ bestW = w; bestI = i; } });
      counts[bestI] = 1;
    }

    function usedSeconds(){
      var active = activeIndices();
      var used = active.length * PREP_SEC;
      active.forEach(function(i){
        used += counts[i]*stages[i].sec + Math.max(0,counts[i]-1)*stages[i].gap;
      });
      return used;
    }

    /* Redistribute any remaining gap to target proportionally across all
       active stages (weighted by their preset share), not just the last
       one — a handful of passes converges since each pass shrinks the
       remaining error. */
    for(var pass=0; pass<6; pass++){
      var active = activeIndices();
      if(!active.length) break;
      var diff = totalSec - usedSeconds();
      if(Math.abs(diff) < stages[active[0]].sec) break;
      var totalActiveW = active.reduce(function(a,i){ return a+weights[i]; },0);
      active.forEach(function(i){
        var share = weights[i]/totalActiveW;
        var delta = Math.round((diff*share)/(stages[i].sec+stages[i].gap));
        counts[i] = clampCount(counts[i]+delta);
      });
    }

    /* Final fine correction on the heaviest-weighted active stage closes
       whatever small remainder the passes above left behind. */
    var finalActive = activeIndices();
    if(finalActive.length){
      var diff2 = totalSec - usedSeconds();
      var biggestI = finalActive.reduce(function(best,i){ return weights[i]>weights[best]?i:best; }, finalActive[0]);
      var st2 = stages[biggestI];
      var adjust2 = Math.round(diff2/(st2.sec+st2.gap));
      var floor2 = finalActive.length === 1 ? 1 : 0;
      counts[biggestI] = Math.max(floor2, Math.min(MAX_POSES_PER_STAGE, counts[biggestI]+adjust2));
    }

    var activeIdx = activeIndices();

    var steps = [];
    activeIdx.forEach(function(i, ai){
      var st = stages[i];
      var n = counts[i];
      var poseWord = n === 1 ? "POSE" : "POSES";
      steps.push({
        type:"prep",
        stageIndex:i,
        title:n+" "+poseWord+" OF "+fmtDuration(st.sec).toUpperCase(),
        speech:"Prepare. "+n+" "+poseWord.toLowerCase()+" of "+fmtDuration(st.sec)+" each.",
        sec:PREP_SEC
      });
      for(var j=0;j<n;j++){
        steps.push({
          type:"pose",
          stageIndex:i,
          title:fmtDuration(st.sec).toUpperCase()+" — GO",
          speech: (st.sec<60? st.sec+" seconds. Go.":Math.round(st.sec/60)+" minute"+(st.sec>60?"s":"")+". Go.") ,
          sec:st.sec
        });
        var isVeryLast = (ai === activeIdx.length-1) && (j === n-1);
        if(!isVeryLast){
          steps.push({
            type:"gap",
            stageIndex:i,
            title:"Next pose",
            speech:"Next pose.",
            sec:st.gap
          });
        }
      }
    });

    var actualTotal = steps.reduce(function(a,s){return a+s.sec;},0);
    return {steps:steps, actualTotal:actualTotal, stageCount:activeIdx.length, poseCount: steps.filter(function(s){return s.type==="pose";}).length};
  }

  /* ---------------- setup view wiring ---------------- */

  var state = {
    totalMinutes: 60,
    preset: "balanced",
    restStyle: "generous"
  };

  function renderBars(){
    Object.keys(PRESETS).forEach(function(key){
      var el = document.getElementById("bar-"+key);
      el.innerHTML = "";
      var tones = ["var(--graphite-soft)","var(--graphite)","var(--sanguine-soft)","var(--sanguine)","var(--sanguine)","var(--sanguine)","var(--sanguine)"];
      PRESETS[key].weights.forEach(function(w, i){
        if(w<=0) return;
        var i2 = document.createElement("i");
        i2.style.width = (w*100)+"%";
        i2.style.background = tones[i];
        el.appendChild(i2);
      });
    });
  }
  renderBars();

  var timeValue = document.getElementById("timeValue");
  document.getElementById("timeMinus").addEventListener("click", function(){
    state.totalMinutes = Math.max(15, state.totalMinutes-5);
    timeValue.textContent = state.totalMinutes;
    updatePreview();
  });
  document.getElementById("timePlus").addEventListener("click", function(){
    state.totalMinutes = Math.min(150, state.totalMinutes+5);
    timeValue.textContent = state.totalMinutes;
    updatePreview();
  });

  var presetBtns = document.querySelectorAll(".presets:not(.rest-presets) .preset-btn");
  presetBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      presetBtns.forEach(function(b){ b.setAttribute("aria-pressed","false"); });
      btn.setAttribute("aria-pressed","true");
      state.preset = btn.dataset.preset;
      updatePreview();
    });
  });

  var restBtns = document.querySelectorAll(".rest-presets .preset-btn");
  restBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      restBtns.forEach(function(b){ b.setAttribute("aria-pressed","false"); });
      btn.setAttribute("aria-pressed","true");
      state.restStyle = btn.dataset.rest;
      updatePreview();
    });
  });

  var previewLine = document.getElementById("previewLine");

  function stageSummaries(steps){
    var groups = [];
    var current = null;
    steps.forEach(function(s){
      if(!current || current.stageIndex !== s.stageIndex){
        current = {stageIndex:s.stageIndex, prepSec:0, poseCount:0, poseSec:0, gapCount:0, gapSec:0};
        groups.push(current);
      }
      if(s.type === "prep") current.prepSec += s.sec;
      else if(s.type === "pose"){ current.poseCount++; current.poseSec = s.sec; }
      else if(s.type === "gap"){ current.gapCount++; current.gapSec = s.sec; }
    });
    return groups;
  }

  function renderBreakdown(sched){
    var groups = stageSummaries(sched.steps);
    var html = "";
    groups.forEach(function(g, idx){
      var subtotal = g.prepSec + g.poseCount*g.poseSec + g.gapCount*g.gapSec;
      var gapNote = g.gapCount ? (", "+fmtDuration(g.gapSec)+" between poses") : "";
      html += '<div class="breakdown-row">'+
        '<div class="bd-stage">Stage '+(idx+1)+' — '+fmtDuration(g.poseSec).toUpperCase()+' poses</div>'+
        '<div class="bd-detail">'+g.prepSec+'s prep cue, then '+g.poseCount+' × '+fmtDuration(g.poseSec)+gapNote+'</div>'+
        '<div class="bd-subtotal num">'+fmtClock(subtotal)+'</div>'+
        '</div>';
    });
    html += '<div class="breakdown-total"><span>Total</span><span class="num">'+fmtClock(sched.actualTotal)+'</span></div>';
    document.getElementById("breakdownTable").innerHTML = html;
  }

  function updatePreview(){
    var sched = buildSchedule(state.totalMinutes, state.preset, currentStages(state.restStyle));
    previewLine.innerHTML = "≈ <strong>"+sched.poseCount+"</strong> poses across <strong>"+sched.stageCount+"</strong> stages · finishes around <strong>"+fmtClock(sched.actualTotal)+"</strong>";
    renderBreakdown(sched);
  }
  updatePreview();

  /* ---------------- audio ---------------- */

  var audioCtx = null;
  function ensureAudio(){
    if(!audioCtx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(AC) audioCtx = new AC();
    }
    if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playBell(){
    if(!document.getElementById("toggleBell").checked) return;
    var ctx = ensureAudio();
    if(!ctx) return;
    var now = ctx.currentTime;
    [880, 880*2.4].forEach(function(freq, i){
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(i===0?0.35:0.12, now+0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now+1.1);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now+1.15);
    });
  }

  function playTick(){
    if(!document.getElementById("toggleBell").checked) return;
    var ctx = ensureAudio();
    if(!ctx) return;
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 1320;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.22, now+0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, now+0.14);
    osc.connect(gain).connect(ctx.destination);
    osc.start(now);
    osc.stop(now+0.16);
  }

  function speak(text){
    if(!document.getElementById("toggleVoice").checked) return;
    if(!("speechSynthesis" in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.rate = 1.0;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }

  /* ---------------- wake lock ---------------- */

  var wakeLock = null;
  function requestWake(){
    if(!document.getElementById("toggleWake").checked) return;
    if("wakeLock" in navigator){
      navigator.wakeLock.request("screen").then(function(lock){ wakeLock = lock; }).catch(function(){});
    }
  }
  function releaseWake(){
    if(wakeLock){ wakeLock.release().catch(function(){}); wakeLock = null; }
  }
  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "visible" && document.body.dataset.view === "session" && runtime.running){
      requestWake();
    }
  });

  /* ---------------- session runtime ---------------- */

  var runtime = {
    steps: [],
    index: -1,
    stepStart: 0,
    stepDurationMs: 0,
    pausedAt: 0,
    running: false,
    totalPlannedSec: 0,
    elapsedBase: 0,
    bellFired: false,
    speechFired: false,
    lastTickSec: null,
    rafId: null
  };

  var dial = document.getElementById("dial");
  var dctx = dial.getContext("2d");
  var DPR = Math.min(window.devicePixelRatio||1, 2);
  function sizeDial(){
    var cssSize = Math.min(dial.parentElement.clientWidth, dial.parentElement.clientHeight, 420);
    dial.style.width = cssSize+"px";
    dial.style.height = cssSize+"px";
    dial.width = cssSize*DPR;
    dial.height = cssSize*DPR;
  }
  window.addEventListener("resize", sizeDial);

  function trackColor(){
    return getComputedStyle(document.body).getPropertyValue("--ring-track").trim();
  }
  function accentColor(kind){
    var cs = getComputedStyle(document.body);
    if(kind === "pose") return cs.getPropertyValue("--sanguine").trim();
    return cs.getPropertyValue("--graphite").trim();
  }

  function drawDial(fraction, kind){
    var w = dial.width, h = dial.height;
    var cx = w/2, cy = h/2, r = (w/2) * 0.86;
    dctx.clearRect(0,0,w,h);
    dctx.lineWidth = w*0.045;
    dctx.lineCap = "round";

    dctx.beginPath();
    dctx.arc(cx, cy, r, 0, Math.PI*2);
    dctx.strokeStyle = trackColor();
    dctx.stroke();

    var start = -Math.PI/2;
    var end = start + Math.PI*2*fraction;
    dctx.beginPath();
    dctx.arc(cx, cy, r, start, end);
    dctx.strokeStyle = accentColor(kind);
    dctx.stroke();
  }

  var dialTimeEl = document.getElementById("dialTime");
  var stageTitleEl = document.getElementById("stageTitle");
  var stageFlagEl = document.getElementById("stageFlag");
  var nextLineEl = document.getElementById("nextLine");
  var railFill = document.getElementById("railFill");
  var sessionClock = document.getElementById("sessionClock");
  var liveRegion = document.getElementById("liveRegion");

  function stageNumberFor(index){
    var s = runtime.steps[index];
    var seen = [];
    for(var i=0;i<=index;i++){
      if(seen.indexOf(runtime.steps[i].stageIndex) === -1) seen.push(runtime.steps[i].stageIndex);
    }
    return seen.length;
  }
  function totalStages(){
    var seen = {};
    runtime.steps.forEach(function(s){ seen[s.stageIndex]=1; });
    return Object.keys(seen).length;
  }

  function elapsedBeforeStep(index){
    var sum = 0;
    for(var i=0;i<index;i++) sum += runtime.steps[i].sec;
    return sum;
  }

  function goToStep(index){
    if(index >= runtime.steps.length){
      finishSession();
      return;
    }
    runtime.index = index;
    var step = runtime.steps[index];
    runtime.stepStart = performance.now();
    runtime.stepDurationMs = step.sec*1000;
    runtime.bellFired = false;
    runtime.speechFired = false;
    runtime.lastTickSec = null;
    runtime.elapsedBase = elapsedBeforeStep(index);

    document.body.dataset.kind = step.type;
    stageTitleEl.textContent = step.title;
    stageFlagEl.textContent = "STAGE "+stageNumberFor(index)+" OF "+totalStages();

    var next = runtime.steps[index+1];
    nextLineEl.innerHTML = next ? "NEXT — <strong>"+next.title.toLowerCase()+"</strong>" : "Final step";

    liveRegion.textContent = step.title;
    speak(step.speech);

    drawDial(1, step.type);
  }

  function tick(){
    if(!runtime.running) return;
    var now = performance.now();
    var elapsedMs = now - runtime.stepStart;
    var remainMs = Math.max(0, runtime.stepDurationMs - elapsedMs);
    var remainSec = remainMs/1000;
    var fraction = runtime.stepDurationMs>0 ? Math.max(0, remainMs/runtime.stepDurationMs) : 0;

    dialTimeEl.textContent = fmtClock(remainSec);
    dialTimeEl.classList.toggle("urgent", remainSec <= 3.05);
    drawDial(fraction, runtime.steps[runtime.index].type);

    var tickSec = Math.round(remainSec);
    if(tickSec >= 1 && tickSec <= 3 && tickSec !== runtime.lastTickSec){
      runtime.lastTickSec = tickSec;
      playTick();
    }

    if(!runtime.bellFired && remainSec <= 0.08){
      runtime.bellFired = true;
      playBell();
    }

    var elapsedTotal = runtime.elapsedBase + (elapsedMs/1000);
    sessionClock.textContent = fmtClock(elapsedTotal)+" / "+fmtClock(runtime.totalPlannedSec);
    railFill.style.width = Math.min(100,(elapsedTotal/runtime.totalPlannedSec)*100)+"%";

    if(remainMs <= 0){
      goToStep(runtime.index+1);
    }

    runtime.rafId = requestAnimationFrame(tick);
  }

  function enterFullscreen(){
    var el = document.documentElement;
    var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(req){ try{ req.call(el); }catch(e){} }
  }
  function exitFullscreen(){
    var isFs = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
    if(!isFs) return;
    var ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(ex){ try{ ex.call(document); }catch(e){} }
  }

  function startSession(){
    var sched = buildSchedule(state.totalMinutes, state.preset, currentStages(state.restStyle));
    runtime.steps = sched.steps;
    runtime.totalPlannedSec = sched.actualTotal;
    runtime.running = true;
    ensureAudio();
    requestWake();
    enterFullscreen();
    document.body.dataset.view = "session";
    sizeDial();
    goToStep(0);
    setPlayPauseUI(true);
    runtime.rafId = requestAnimationFrame(tick);
  }

  function pauseSession(){
    if(!runtime.running) return;
    runtime.running = false;
    runtime.pausedRemainMs = runtime.stepDurationMs - (performance.now()-runtime.stepStart);
    cancelAnimationFrame(runtime.rafId);
    setPlayPauseUI(false);
    window.speechSynthesis && window.speechSynthesis.cancel();
  }
  function resumeSession(){
    if(runtime.running) return;
    runtime.stepStart = performance.now() - (runtime.stepDurationMs - runtime.pausedRemainMs);
    runtime.running = true;
    setPlayPauseUI(true);
    requestWake();
    runtime.rafId = requestAnimationFrame(tick);
  }
  function setPlayPauseUI(isPlaying){
    document.getElementById("iconPause").style.display = isPlaying ? "block":"none";
    document.getElementById("iconPlay").style.display = isPlaying ? "none":"block";
    document.getElementById("playPauseBtn").setAttribute("aria-label", isPlaying ? "Pause":"Resume");
  }

  function finishSession(){
    runtime.running = false;
    cancelAnimationFrame(runtime.rafId);
    releaseWake();
    exitFullscreen();
    window.speechSynthesis && window.speechSynthesis.cancel();
    var poseCount = runtime.steps.filter(function(s){return s.type==="pose";}).length;
    document.getElementById("doneTotal").textContent = fmtClock(runtime.totalPlannedSec);
    document.getElementById("donePoseCount").textContent = poseCount + " poses completed";
    document.body.dataset.view = "done";
  }

  document.getElementById("startBtn").addEventListener("click", startSession);

  document.getElementById("playPauseBtn").addEventListener("click", function(){
    if(runtime.running) pauseSession(); else resumeSession();
  });
  document.getElementById("skipBtn").addEventListener("click", function(){
    window.speechSynthesis && window.speechSynthesis.cancel();
    goToStep(runtime.index+1);
  });
  var endConfirmTimer = null;
  document.getElementById("endBtn").addEventListener("click", function(){
    var btn = this;
    if(btn.dataset.confirming === "true"){
      clearTimeout(endConfirmTimer);
      btn.dataset.confirming = "false";
      btn.setAttribute("aria-label","End session");
      btn.title = "End session";
      finishSession();
      return;
    }
    btn.dataset.confirming = "true";
    btn.setAttribute("aria-label","Tap again to confirm ending");
    btn.title = "Tap again to end";
    liveRegion.textContent = "Tap end again to confirm.";
    endConfirmTimer = setTimeout(function(){
      btn.dataset.confirming = "false";
      btn.setAttribute("aria-label","End session");
      btn.title = "End session";
    }, 2500);
  });
  document.getElementById("restartBtn").addEventListener("click", function(){
    document.body.dataset.view = "setup";
  });

  document.addEventListener("keydown", function(e){
    if(document.body.dataset.view !== "session") return;
    if(e.code === "Space"){ e.preventDefault(); if(runtime.running) pauseSession(); else resumeSession(); }
    else if(e.code === "ArrowRight"){ document.getElementById("skipBtn").click(); }
    else if(e.code === "Escape"){ document.getElementById("endBtn").click(); }
  });

  (function registerSW(){
    var statusEl = document.getElementById("pwaStatus");
    function setStatus(text, ok){
      if(!statusEl) return;
      statusEl.textContent = text;
      statusEl.style.color = ok ? "var(--sanguine)" : "var(--graphite)";
    }
    if(!("serviceWorker" in navigator)){
      setStatus("not supported in this browser", false);
      return;
    }
    var swSource = [
      "var CACHE = 'croquis-v2';",
      "self.addEventListener('install', function(e){ self.skipWaiting(); });",
      "self.addEventListener('activate', function(e){",
      "  e.waitUntil(Promise.all([",
      "    self.clients.claim(),",
      "    caches.keys().then(function(keys){",
      "      return Promise.all(keys.filter(function(k){ return k !== CACHE; }).map(function(k){ return caches.delete(k); }));",
      "    })",
      "  ]));",
      "});",
      "self.addEventListener('fetch', function(e){",
      "  if(e.request.method !== 'GET') return;",
      "  e.respondWith(",
      "    fetch(e.request).then(function(res){",
      "      var copy = res.clone();",
      "      caches.open(CACHE).then(function(c){ c.put(e.request, copy); });",
      "      return res;",
      "    }).catch(function(){",
      "      return caches.match(e.request).then(function(r){ return r || caches.match(self.registration.scope); });",
      "    })",
      "  );",
      "});"
    ].join("\n");
    try{
      var blobUrl = URL.createObjectURL(new Blob([swSource], {type:"text/javascript"}));
      navigator.serviceWorker.register(blobUrl, {scope:"./"}).then(function(reg){
        setStatus("ready — installable, works offline", true);
      }).catch(function(err){
        setStatus("unavailable here (" + (err && err.name || "error") + ")", false);
      });
    }catch(err){
      setStatus("unavailable here", false);
    }
  })();

  document.body.dataset.view = "setup";
})();
</script>
